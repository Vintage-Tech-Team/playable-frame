services:
  postgres:
    image: postgres:16-alpine
    container_name: estate-util-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: estate
      POSTGRES_PASSWORD: estate_dev
      POSTGRES_DB: estate_util
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
